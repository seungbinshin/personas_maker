services:
  api:
    container_name: exitx-ccapi
    build: .
    ports:
      - "${PORT:-8080}:8080"
    restart: always
    environment:
      - NODE_ENV=production
      - API_KEYS=${API_KEYS:-}
      - POOL_SIZE=${POOL_SIZE:-2}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
    volumes:
      - claude-auth:/home/node/.claude
      - agent-home:/home/node/users
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - exitx
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
        reservations:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  claude-auth:
  agent-home:

networks:
  exitx:
    name: exitx
    driver: bridge
